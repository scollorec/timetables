<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
    <link rel="stylesheet" href="lines.css">
    <link rel="stylesheet" href="station.css">
    <link rel="stylesheet" href="arrivals.css">

    <title>Live Timetable</title>
<link href="/timetables/favicon.ico" rel="icon" type="image/x-icon">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

</head>
<body>

    <div class="container" id="timetable-container">
        <!-- Search bar will be inserted here by JavaScript -->
        <div id="search-container" class="search-container" style="display: none;">
            <input type="text" id="search-input" placeholder="Search for stations..." class="search-input">
            <button id="search-close" class="search-close">✕</button>
        </div>
        <!-- Timetable options will be inserted here by JavaScript -->
    </div>


    <div class="container" id="space">
        <!-- Timetable options will be inserted here by JavaScript -->
    </div>

    <!-- Dark mode toggle button -->
    <button id="dark-mode-toggle" class="dark-mode-toggle">🌙</button>

    <script src="app.js"></script>
    <script src="config.js"></script>
    <script src="api.js"></script>
    <script src="utils.js"></script>
    <script src="storage.js"></script>
    <script src="lines.js"></script>
    <script src="stations.js"></script>
    <script src="arrivals.js"></script>
    <script src="errorHandler.js"></script>
    <script src="errorUI.js"></script>
 <!--   <script src="https://cdn.jsdelivr.net/npm/coi-serviceworker@0.1.6/coi-serviceworker.min.js"></script> -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('/sw.js')
                    .then(function(registration) {
                        console.log('ServiceWorker registration successful with scope: ', registration.scope);
                    }, function(err) {
                        console.log('ServiceWorker registration failed: ', err);
                    });
            });
        }
    </script>
</body>
</html>
